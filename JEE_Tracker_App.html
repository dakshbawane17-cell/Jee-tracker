<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JEE Tracker</title>
<link rel="icon" href="icon-192.png">

    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

<style>
  * { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
  html, body { background:#f6f8fa; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color:#1a1f36; }
  button { font-family: inherit; }
  #root { min-height: 100vh; }
</style>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ════════════════════════════════════════════════════════════════
   Same Stripe-fintech design as the Claude artifact version, but
   storage is 100% local — window.localStorage — so it works fully
   offline and never depends on any external service being up.
   ════════════════════════════════════════════════════════════════ */

const BG       = "#f6f8fa";
const CARD     = "#ffffff";
const BORDER   = "#e3e8ee";
const INK      = "#1a1f36";
const INK_MUTE = "#697386";
const INK_FAINT= "#a3acb9";
const INDIGO   = "#635bff";
const INDIGO_SOFT = "#eeebff";
const GREEN    = "#00a32c";
const GREEN_SOFT = "#e3f9e5";
const ORANGE   = "#b15c00";
const ORANGE_SOFT = "#fff4e0";
const BLUE     = "#0a6ad1";
const BLUE_SOFT = "#e6f0fb";

const SYLLABUS = {
  Mathematics: {
    color: "#635bff",
    code: "MTH",
    resources: ["Module", "PYQ", "Blackbook"],
    chapters: [
      "Basic Math","Logarithm","Quadratic Equation","Sequence & Series",
      "Permutation & Combination","Trigonometric Equation","Basic Calculus",
      "Straight Lines","Circle","Determinants","Compound Angle","Ellipse",
      "Hyperbola","Binomial Theorem","Conic Section","Matrices",
      "Relation & Function","Inverse Trigonometric Function","Limits",
      "Continuity","Differentiability","Method of Differentiation",
      "Integration","Definite Integral","Application of Derivatives",
      "Area under Curves","Differential Equation","Vector & 3D",
      "Probability","Complex Numbers",
    ],
  },
  Physics: {
    color: "#d4925f",
    code: "PHY",
    resources: ["Module", "HC Verma", "Irodov", "Pathfinder", "PYQ"],
    chapters: [
      "Units & Dimensions","Vector","Kinematics","Newton's Law of Motion",
      "Circular Motion & Work Power Energy","Centre of Mass, Momentum & Collision",
      "Rotational Dynamics","Simple Harmonic Motion","Fluid Mechanics","Elasticity",
      "Thermal Expansion","KTG & Thermodynamics","Wave in String","Sound Waves",
      "Geometrical Optics","Wave Optics","Electrostatics","Gravitation",
      "Current Electricity","Capacitance","Magnetic Effect of Current",
      "Electromagnetic Induction","Alternating Current","Modern Physics",
      "Semiconductors","Error & Instruments",
    ],
  },
  Chemistry: {
    color: "#00a32c",
    code: "CHM",
    sections: {
      Physical: {
        color: "#0a6ad1",
        code: "CHM-P",
        resources: ["Module", "N. Awasthi", "PYQ"],
        chapters: [
          "Mole Concept","Atomic Structure","Chemical Equilibrium","Ionic Equilibrium",
          "Gaseous State","Chemical Kinetics","Redox Reaction","Thermodynamics",
          "Electrochemistry","Liquid Solution","Solid State","Surface Chemistry",
        ],
      },
      Organic: {
        color: "#d4925f",
        code: "CHM-O",
        resources: ["Module", "MS Chouhan", "PYQ"],
        chapters: [
          "IUPAC","GOC (General Organic Chemistry)","Tautomerism","Hydrocarbon",
          "Isomerism","Alkyl Halide & Halide","Grignard Reagent","Carbene & Nitrene",
          "Alcohol, Ether & Phenol","Carbonyl Compound","Aromatic Chemistry",
          "Aniline","Phenol","Carbohydrates","Amino Acid",
        ],
      },
      Inorganic: {
        color: "#8b5cf6",
        code: "CHM-I",
        resources: ["Module", "VK Jaiswal", "PYQ"],
        chapters: [
          "Quantum Number & Electron Configuration","Periodic Table & Modern Properties",
          "Chemical Bonding","Coordination Compound","Types of Reaction",
          "p-Block Elements","d & f Block Elements","Salt Analysis",
          "Hydrogen & its Compounds","s-Block Elements","Metallurgy",
        ],
      },
    },
  },
};

const STATUS_CYCLE = ["not_started","in_progress","completed","revision"];
const STATUS_META = {
  not_started: { label:"Not started", color: INK_FAINT, bg:"#f6f8fa",   dot:"#d8dee4" },
  in_progress: { label:"In progress", color: ORANGE,    bg: ORANGE_SOFT, dot:"#ffa412" },
  completed:   { label:"Completed",   color: GREEN,     bg: GREEN_SOFT,  dot:"#00d924" },
  revision:    { label:"Revised",     color: BLUE,      bg: BLUE_SOFT,   dot:"#3b8ef0" },
};

const STORAGE_KEY = "jee-tracker-local-v1";

function storeKey(subject, chapter, section) {
  return section ? `${subject}||${section}||${chapter}` : `${subject}||${chapter}`;
}
function resKey(subject, chapter, section, resource) {
  return `${storeKey(subject, chapter, section)}::${resource}`;
}
function getAllChapters(subKey) {
  const sub = SYLLABUS[subKey];
  if (sub.sections) return Object.entries(sub.sections).flatMap(([sec,s]) => s.chapters.map(ch => ({ chapter:ch, section:sec })));
  return sub.chapters.map(ch => ({ chapter:ch, section:null }));
}
function getResourcesFor(subKey, secKey) {
  const sub = SYLLABUS[subKey];
  return sub.sections ? sub.sections[secKey].resources : sub.resources;
}
function calcStats(chapters, fn) {
  const counts = { not_started:0, in_progress:0, completed:0, revision:0 };
  chapters.forEach(({ chapter, section }) => counts[fn(chapter, section)]++);
  const done = counts.completed + counts.revision;
  // "Completed" display should also include chapters that have been revised
  // (revision is an upgrade beyond completed, not a separate bucket).
  const completedDisplay = counts.completed + counts.revision;
  return { counts, done, completedDisplay, total:chapters.length, pct: chapters.length ? Math.round((done/chapters.length)*100) : 0 };
}

function migrateHistory(rawHistory, progress) {
  // Old format stored a single ISO string per chapter (last update time).
  // New format stores { in_progress, completed, revision } timestamps separately.
  const migrated = {};
  Object.keys(rawHistory || {}).forEach(key => {
    const val = rawHistory[key];
    if (val && typeof val === "object" && !Array.isArray(val)) {
      migrated[key] = val; // already new format
    } else if (typeof val === "string") {
      const status = progress[key] || "not_started";
      migrated[key] = status !== "not_started" ? { [status]: val } : {};
    }
  });
  return migrated;
}

function loadLocal() {
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if (!raw) return { progress:{}, resProgress:{}, history:{} };
    const parsed = JSON.parse(raw);
    const progress = parsed.progress || {};
    return {
      progress,
      resProgress: parsed.resProgress || {},
      history: migrateHistory(parsed.history || {}, progress),
    };
  } catch (e) {
    return { progress:{}, resProgress:{}, history:{} };
  }
}
function saveLocal(data) {
  try {
    window.localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    return true;
  } catch (e) {
    return false;
  }
}

function Bar({ pct, color, height=6 }) {
  return (
    <div style={{ background:"#f0f1f5", borderRadius:99, height, overflow:"hidden" }}>
      <div style={{ width:`${pct}%`, height:"100%", background:color, borderRadius:99, transition:"width 0.5s ease" }}/>
    </div>
  );
}

function JEETracker() {
  const [progress, setProgress] = useState({});
  const [resProgress, setResProgress] = useState({});
  const [history, setHistory] = useState({});
  const [activeSubject, setActiveSubject] = useState("Mathematics");
  const [activeSection, setActiveSection] = useState("Physical");
  const [filter, setFilter] = useState("all");
  const [expanded, setExpanded] = useState({});
  const [loading, setLoading] = useState(true);
  const [saveState, setSaveState] = useState("idle");
  const [savingKey, setSavingKey] = useState(null);
  const [savedKey, setSavedKey] = useState(null);
  const [backupMode, setBackupMode] = useState(null);
  const [showHistory, setShowHistory] = useState(false);
  const [historyFilter, setHistoryFilter] = useState("all");
  const [importText, setImportText] = useState("");
  const [importMsg, setImportMsg] = useState("");
  const [copyMsg, setCopyMsg] = useState("");
  const [storageOK, setStorageOK] = useState(true);

  useEffect(() => {
    const data = loadLocal();
    setProgress(data.progress);
    setResProgress(data.resProgress);
    setHistory(data.history);
    // quick capability check
    try {
      window.localStorage.setItem("__jee_test__", "1");
      window.localStorage.removeItem("__jee_test__");
    } catch (e) {
      setStorageOK(false);
    }
    setLoading(false);
  }, []);

  const persist = (upd, resUpd, key, updHist) => {
    setSaveState("saving"); setSavingKey(key); setSavedKey(null);
    const payload = {
      progress: upd !== undefined ? upd : progress,
      resProgress: resUpd !== undefined ? resUpd : resProgress,
      history: updHist !== undefined ? updHist : history,
    };
    // localStorage is synchronous — this either works or throws, no flaky network involved
    const ok = saveLocal(payload);
    if (ok) {
      setSaveState("saved"); setSavingKey(null); setSavedKey(key);
      setTimeout(() => setSaveState("idle"), 1200);
      setTimeout(() => setSavedKey(null), 1200);
    } else {
      setSaveState("error"); setSavingKey(null);
    }
  };

  const getStatus = (chapter, section, subOverride) => {
    const sub = subOverride || activeSubject;
    return progress[storeKey(sub, chapter, section)] || "not_started";
  };
  const getResStatus = (chapter, section, resource, subOverride) => {
    const sub = subOverride || activeSubject;
    return resProgress[resKey(sub, chapter, section, resource)] || "not_started";
  };
  const getTimestamp = (chapter, section, subOverride) => {
    const sub = subOverride || activeSubject;
    const entry = history[storeKey(sub, chapter, section)];
    if (!entry) return null;
    const status = getStatus(chapter, section, sub);
    return entry[status] || null;
  };
  const getHistoryEntry = (chapter, section, subOverride) => {
    const sub = subOverride || activeSubject;
    return history[storeKey(sub, chapter, section)] || null;
  };
  const formatTimestamp = (iso) => {
    if (!iso) return null;
    const d = new Date(iso);
    return `${d.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"2-digit"})} · ${d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})}`;
  };

  const cycleStatus = (chapter, section) => {
    const key = storeKey(activeSubject, chapter, section);
    const curr = progress[key] || "not_started";
    const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(curr)+1) % STATUS_CYCLE.length];
    const upd = { ...progress, [key]: next };
    const now = new Date().toISOString();
    // Keep a separate timestamp per status reached (in_progress / completed / revision).
    // Cycling back to "not_started" doesn't erase past history — it's just not a stage worth dating.
    const prevEntry = history[key] || {};
    const updHist = next === "not_started"
      ? history
      : { ...history, [key]: { ...prevEntry, [next]: now } };
    setProgress(upd); setHistory(updHist);
    persist(upd, undefined, key, updHist);
  };

  const cycleResource = (chapter, section, resource, e) => {
    e.stopPropagation();
    const key = resKey(activeSubject, chapter, section, resource);
    const curr = resProgress[key] || "not_started";
    const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(curr)+1) % STATUS_CYCLE.length];
    const upd = { ...resProgress, [key]: next };
    setResProgress(upd);
    persist(undefined, upd, key, undefined);
  };

  const toggleExpand = (chapter, section, e) => {
    e.stopPropagation();
    const k = storeKey(activeSubject, chapter, section);
    setExpanded(prev => ({ ...prev, [k]: !prev[k] }));
  };

  const getSubjectStats = (subKey) => {
    const all = getAllChapters(subKey);
    return calcStats(all, (ch,sec) => progress[storeKey(subKey,ch,sec)] || "not_started");
  };
  const getSectionStats = (subKey, secKey) => {
    const chs = SYLLABUS[subKey].sections[secKey].chapters.map(ch => ({ chapter:ch, section:secKey }));
    return calcStats(chs, (ch,sec) => progress[storeKey(subKey,ch,sec)] || "not_started");
  };
  const getTotalStats = () => {
    let done=0, total=0;
    Object.keys(SYLLABUS).forEach(sub => { const s=getSubjectStats(sub); done+=s.done; total+=s.total; });
    return { done, total, pct: total ? Math.round((done/total)*100) : 0 };
  };

  const getHistoryList = () => {
    const items = [];
    Object.keys(SYLLABUS).forEach(subKey => {
      getAllChapters(subKey).forEach(({ chapter, section }) => {
        const key = storeKey(subKey, chapter, section);
        const entry = history[key];
        if (entry && Object.keys(entry).length > 0) {
          const times = ["in_progress","completed","revision"].map(s => entry[s] ? new Date(entry[s]).getTime() : 0);
          items.push({ subject: subKey, section, chapter, entry, latest: Math.max(...times) });
        }
      });
    });
    items.sort((a,b) => b.latest - a.latest);
    return items;
  };

  if (loading) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", height:"100vh",
      background:BG, fontSize:13, color:INK_MUTE }}>
      Loading tracker…
    </div>
  );

  const total = getTotalStats();
  const currentSub = SYLLABUS[activeSubject];
  const hasSections = !!currentSub.sections;
  const currentSection = hasSections ? activeSection : null;
  const currentChapters = hasSections ? currentSub.sections[activeSection].chapters : currentSub.chapters;
  const currentResources = getResourcesFor(activeSubject, activeSection);

  const filtered = filter === "all" ? currentChapters : currentChapters.filter(ch => getStatus(ch, currentSection) === filter);

  return (
    <div style={{ background:BG, minHeight:"100vh", color:INK }}>

      {!storageOK && (
        <div style={{ background:"#fff4e0", color:"#b15c00", fontSize:12, fontWeight:600, padding:"8px 16px", textAlign:"center" }}>
          ⚠ Your browser is blocking local storage (private/incognito mode?). Switch to normal browsing mode to save progress.
        </div>
      )}

      {/* ═══ HEADER ═══ */}
      <div style={{ background:CARD, borderBottom:`1px solid ${BORDER}` }}>
        <div style={{ maxWidth:700, margin:"0 auto", padding:"20px 18px 0" }}>

          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div style={{ fontSize:11, color:INK_MUTE, fontWeight:500 }}>JEE Main &amp; Advanced</div>
              <div style={{ fontSize:19, fontWeight:600, marginTop:3, letterSpacing:-0.2 }}>Syllabus Tracker</div>
            </div>
            <button onClick={() => setShowHistory(true)} style={{
              display:"flex", alignItems:"center", gap:5, background:"#f9fafb",
              border:`1px solid ${BORDER}`, borderRadius:7, padding:"6px 10px", cursor:"pointer", flexShrink:0 }}>
              <span style={{ fontSize:13 }}>🕒</span>
              <span style={{ fontSize:11, fontWeight:600, color:INK_MUTE }}>History</span>
            </button>
          </div>

          <div style={{ display:"inline-flex", alignItems:"center", gap:7, marginTop:9,
            background: INDIGO_SOFT, border:`1px solid #d9d4ff`, borderRadius:7, padding:"5px 11px" }}>
            <span style={{ width:6, height:6, borderRadius:"50%", background:INDIGO, flexShrink:0 }}/>
            <span style={{ fontSize:10.5, fontWeight:600, color:INDIGO, letterSpacing:0.3 }}>AIM</span>
            <span style={{ fontSize:12, fontWeight:600, color:INK }}>IIT Bombay — Computer Science</span>
          </div>

          <div style={{ fontSize:10.5, fontWeight:600, marginTop:8, minHeight:14,
            color: saveState==="saved" ? GREEN : saveState==="saving" ? ORANGE : saveState==="error" ? "#df1c41" : "transparent" }}>
            {saveState==="saving" && "Saving…"}
            {saveState==="saved" && "✓ Saved on this device"}
            {saveState==="error" && "⚠ Could not save — storage blocked"}
          </div>

          <div style={{ display:"flex", gap:8, marginTop:14, marginBottom:16 }}>
            <div style={{ flex:1, background:CARD, border:`1px solid ${BORDER}`, borderRadius:8, padding:"11px 13px" }}>
              <div style={{ fontSize:20, fontWeight:600, color:INK }}>{total.pct}%</div>
              <div style={{ fontSize:10, color:INK_MUTE, marginTop:2 }}>Overall</div>
            </div>
            <div style={{ flex:1, background:CARD, border:`1px solid ${BORDER}`, borderRadius:8, padding:"11px 13px" }}>
              <div style={{ fontSize:20, fontWeight:600, color:INK }}>{total.done}/{total.total}</div>
              <div style={{ fontSize:10, color:INK_MUTE, marginTop:2 }}>Chapters</div>
            </div>
            <button onClick={() => { setBackupMode("export"); setCopyMsg(""); }} style={{
              flex:1, background:CARD, border:`1px solid ${BORDER}`, borderRadius:8, padding:"11px 13px",
              cursor:"pointer", textAlign:"left" }}>
              <div style={{ fontSize:14, fontWeight:600, color:INDIGO }}>Backup</div>
              <div style={{ fontSize:10, color:INK_MUTE, marginTop:2 }}>Export / restore</div>
            </button>
          </div>

          <div style={{ display:"flex", gap:6, paddingBottom:0 }}>
            {Object.entries(SYLLABUS).map(([subKey, subVal]) => {
              const st = getSubjectStats(subKey);
              const active = activeSubject === subKey;
              return (
                <button key={subKey} onClick={() => {
                  setActiveSubject(subKey);
                  if (subVal.sections) setActiveSection(Object.keys(subVal.sections)[0]);
                  setFilter("all");
                }} style={{
                  padding:"7px 13px", borderRadius:7, fontSize:12.5, fontWeight:500, cursor:"pointer",
                  background: active ? INDIGO : "transparent",
                  color: active ? "#fff" : INK_MUTE,
                  border:"none", marginBottom:10,
                }}>
                  {subKey} <span style={{ opacity:0.75, fontSize:11 }}>· {st.pct}%</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      {/* ═══ BODY ═══ */}
      <div style={{ maxWidth:700, margin:"0 auto", padding:"18px 18px 56px" }}>

        {hasSections && (
          <div style={{ display:"flex", gap:8, marginBottom:16 }}>
            {Object.entries(currentSub.sections).map(([secKey, secVal]) => {
              const ss = getSectionStats(activeSubject, secKey);
              const active = activeSection === secKey;
              return (
                <button key={secKey} onClick={() => { setActiveSection(secKey); setFilter("all"); }}
                  style={{
                    flex:1, padding:"11px 12px", borderRadius:8, cursor:"pointer", textAlign:"left",
                    background: CARD, border:`1px solid ${active ? secVal.color : BORDER}`,
                  }}>
                  <div style={{ fontSize:11.5, fontWeight:600, color: active ? secVal.color : INK_MUTE }}>{secKey}</div>
                  <div style={{ fontSize:10, color:INK_MUTE, marginTop:2 }}>{ss.pct}% · {ss.done}/{ss.total}</div>
                  <div style={{ marginTop:7 }}><Bar pct={ss.pct} color={secVal.color} height={4}/></div>
                </button>
              );
            })}
          </div>
        )}

        <div style={{ display:"flex", gap:8, marginBottom:14 }}>
          {Object.entries(STATUS_META).map(([key, meta]) => {
            const stats = hasSections ? getSectionStats(activeSubject, activeSection) : getSubjectStats(activeSubject);
            // "Completed" card shows completed + revised together, since revision is an upgrade of completed.
            const count = key === "completed" ? stats.completedDisplay : stats.counts[key];
            return (
              <div key={key} style={{ flex:1, background:CARD, border:`1px solid ${BORDER}`, borderRadius:8, padding:"9px 8px", textAlign:"center" }}>
                <div style={{ fontSize:16, fontWeight:600, color:INK }}>{count}</div>
                <div style={{ fontSize:9, fontWeight:600, color:meta.color, marginTop:2 }}>{meta.label}</div>
              </div>
            );
          })}
        </div>

        <div style={{ display:"flex", gap:6, marginBottom:14, flexWrap:"wrap" }}>
          {["all", ...STATUS_CYCLE].map(f => {
            const active = filter === f;
            const meta = f === "all" ? null : STATUS_META[f];
            return (
              <button key={f} onClick={() => setFilter(f)} style={{
                fontSize:11.5, fontWeight:500, padding:"5px 12px", borderRadius:7, cursor:"pointer",
                background: active ? INDIGO_SOFT : "#f9fafb",
                color: active ? INDIGO : INK_MUTE,
                border:`1px solid ${active ? "#e0e7ff" : BORDER}`,
              }}>
                {f === "all" ? `All · ${currentChapters.length}` : meta.label}
              </button>
            );
          })}
        </div>

        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {filtered.length === 0 && (
            <div style={{ textAlign:"center", color:INK_FAINT, padding:"40px 0", fontSize:13 }}>No chapters in this filter.</div>
          )}
          {filtered.map((chapter) => {
            const status = getStatus(chapter, currentSection);
            const meta = STATUS_META[status];
            const idx = currentChapters.indexOf(chapter) + 1;
            const done = status === "completed" || status === "revision";
            const ts = getTimestamp(chapter, currentSection);
            const key = storeKey(activeSubject, chapter, currentSection);
            const isOpen = !!expanded[key];

            return (
              <div key={chapter} style={{ background:CARD, border:`1px solid ${BORDER}`, borderRadius:10, overflow:"hidden" }}>
                <div onClick={() => cycleStatus(chapter, currentSection)}
                  style={{ display:"flex", alignItems:"center", gap:11, padding:"12px 14px", cursor:"pointer", userSelect:"none" }}>
                  <span style={{ fontSize:10.5, color:INK_FAINT, fontWeight:600, minWidth:18, textAlign:"right" }}>{idx}</span>
                  <span style={{ width:8, height:8, borderRadius:"50%", background:meta.dot, flexShrink:0 }}/>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:13, fontWeight:500, color: done ? INK_FAINT : INK,
                      textDecoration: done ? "line-through" : "none" }}>{chapter}</div>
                    {ts && status!=="not_started" && (
                      <div style={{ fontSize:9.5, color:INK_FAINT, marginTop:2 }}>{formatTimestamp(ts)}</div>
                    )}
                  </div>
                  {savingKey === key && <span style={{ fontSize:10, color:ORANGE, fontWeight:600 }}>saving…</span>}
                  {savedKey === key && <span style={{ fontSize:12, color:GREEN, fontWeight:800 }}>✓</span>}
                  <span style={{ fontSize:10.5, fontWeight:600, padding:"3px 9px", borderRadius:99, background:meta.bg, color:meta.color, whiteSpace:"nowrap" }}>
                    {meta.label}
                  </span>
                  <button onClick={(e) => toggleExpand(chapter, currentSection, e)} style={{
                    border:"none", background:"transparent", cursor:"pointer", color:INK_FAINT,
                    fontSize:13, padding:"2px 4px", flexShrink:0, transform: isOpen ? "rotate(90deg)" : "rotate(0deg)",
                    transition:"transform 0.15s ease" }}>
                    ›
                  </button>
                </div>

                {isOpen && (
                  <div style={{ borderTop:`1px solid ${BORDER}`, background:"#fafbfc", padding:"10px 14px 12px" }}>
                    <div style={{ fontSize:9.5, fontWeight:600, color:INK_FAINT, letterSpacing:0.4, marginBottom:8 }}>
                      BOOKS &amp; PRACTICE
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                      {currentResources.map(resource => {
                        const rStatus = getResStatus(chapter, currentSection, resource);
                        const rMeta = STATUS_META[rStatus];
                        const rKey = resKey(activeSubject, chapter, currentSection, resource);
                        return (
                          <div key={resource} onClick={(e) => cycleResource(chapter, currentSection, resource, e)}
                            style={{ display:"flex", alignItems:"center", gap:9, padding:"7px 10px",
                              background:CARD, border:`1px solid ${BORDER}`, borderRadius:7, cursor:"pointer" }}>
                            <span style={{ width:6, height:6, borderRadius:"50%", background:rMeta.dot, flexShrink:0 }}/>
                            <span style={{ flex:1, fontSize:12, color:INK, fontWeight:500 }}>{resource}</span>
                            {savingKey === rKey && <span style={{ fontSize:9.5, color:ORANGE }}>saving…</span>}
                            {savedKey === rKey && <span style={{ fontSize:11, color:GREEN, fontWeight:800 }}>✓</span>}
                            <span style={{ fontSize:9.5, fontWeight:600, padding:"2px 8px", borderRadius:99, background:rMeta.bg, color:rMeta.color }}>
                              {rMeta.label}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div style={{ marginTop:20, padding:"12px 16px", background:CARD, border:`1px solid ${BORDER}`, borderRadius:10, textAlign:"center" }}>
          <div style={{ fontSize:11, color:INK_MUTE }}>
            Tap a chapter to cycle its status · Tap <b>›</b> to track individual books and PYQ
          </div>
          <div style={{ fontSize:10, color:INK_FAINT, marginTop:6 }}>
            Saved instantly on this device. Use Backup if you switch phones or browsers.
          </div>
        </div>
      </div>

      {backupMode && (
        <div onClick={() => setBackupMode(null)} style={{
          position:"fixed", inset:0, background:"rgba(26,31,54,0.45)", zIndex:50,
          display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:CARD, border:`1px solid ${BORDER}`, borderRadius:12,
            padding:20, width:"100%", maxWidth:420, maxHeight:"80vh", overflowY:"auto" }}>

            <div style={{ display:"flex", gap:8, marginBottom:14 }}>
              <button onClick={() => { setBackupMode("export"); setCopyMsg(""); }} style={{
                flex:1, padding:"8px 0", borderRadius:7, fontSize:12, fontWeight:600, cursor:"pointer",
                border:`1px solid ${backupMode==="export" ? INDIGO : BORDER}`,
                background: backupMode==="export" ? INDIGO_SOFT : "transparent",
                color: backupMode==="export" ? INDIGO : INK_MUTE }}>
                Export
              </button>
              <button onClick={() => { setBackupMode("import"); setImportMsg(""); }} style={{
                flex:1, padding:"8px 0", borderRadius:7, fontSize:12, fontWeight:600, cursor:"pointer",
                border:`1px solid ${backupMode==="import" ? INDIGO : BORDER}`,
                background: backupMode==="import" ? INDIGO_SOFT : "transparent",
                color: backupMode==="import" ? INDIGO : INK_MUTE }}>
                Restore
              </button>
            </div>

            {backupMode === "export" && (
              <>
                <div style={{ fontSize:12, color:INK_MUTE, marginBottom:10, lineHeight:1.55 }}>
                  Tap the box — it selects the code automatically. Long-press and choose
                  <b> Copy</b>, then paste it somewhere safe (WhatsApp to yourself, Notes app) — useful if you switch phones.
                </div>
                <textarea id="backup-export-box" readOnly value={JSON.stringify({ progress, resProgress, history })}
                  onFocus={e => e.target.select()} onClick={e => { e.target.focus(); e.target.select(); }}
                  style={{ width:"100%", height:140, background:BG, color:INK,
                    border:`1px solid ${BORDER}`, borderRadius:7, padding:10,
                    fontSize:11.5, fontFamily:"monospace", resize:"none", boxSizing:"border-box",
                    lineHeight:1.5, wordBreak:"break-all" }} />
                <button onClick={() => {
                  const box = document.getElementById("backup-export-box");
                  let copied = false;
                  try { box.focus(); box.select(); copied = document.execCommand("copy"); } catch (e) {}
                  setCopyMsg(copied ? "✓ Copied — paste it somewhere safe." : "Couldn't auto-copy. Text is selected above — long-press and tap Copy.");
                  setTimeout(() => setCopyMsg(""), 4000);
                }} style={{ marginTop:10, width:"100%", padding:"10px 0", borderRadius:7,
                  background:INDIGO, color:"#fff", fontWeight:600, fontSize:13, border:"none", cursor:"pointer" }}>
                  Select &amp; try copy
                </button>
                {copyMsg && <div style={{ marginTop:8, fontSize:11, color: copyMsg.startsWith("✓") ? GREEN : ORANGE, textAlign:"center" }}>{copyMsg}</div>}
              </>
            )}

            {backupMode === "import" && (
              <>
                <div style={{ fontSize:12, color:INK_MUTE, marginBottom:10, lineHeight:1.55 }}>
                  Paste a previously saved backup code below. This overwrites your current progress on this device.
                </div>
                <textarea value={importText} onChange={e => setImportText(e.target.value)} placeholder="Paste your backup code here…"
                  style={{ width:"100%", height:120, background:BG, color:INK,
                    border:`1px solid ${BORDER}`, borderRadius:7, padding:10,
                    fontSize:11, fontFamily:"monospace", resize:"none", boxSizing:"border-box" }} />
                <button onClick={() => {
                  try {
                    const parsed = JSON.parse(importText);
                    if (typeof parsed !== "object" || parsed === null || Array.isArray(parsed)) throw new Error("not an object");
                    const newProgress = parsed.progress || {};
                    const newRes = parsed.resProgress || {};
                    const newHistory = parsed.history || {};
                    setProgress(newProgress); setResProgress(newRes); setHistory(newHistory);
                    persist(newProgress, newRes, null, newHistory);
                    setImportMsg("✓ Restored and saved on this device.");
                    setBackupMode(null);
                  } catch (e) { setImportMsg("⚠ That doesn't look like a valid backup code."); }
                }} style={{ marginTop:10, width:"100%", padding:"10px 0", borderRadius:7,
                  background:GREEN, color:"#fff", fontWeight:600, fontSize:13, border:"none", cursor:"pointer" }}>
                  Restore progress
                </button>
                {importMsg && <div style={{ marginTop:8, fontSize:11, color: importMsg.startsWith("✓") ? GREEN : "#df1c41", textAlign:"center" }}>{importMsg}</div>}
              </>
            )}

            <button onClick={() => setBackupMode(null)} style={{
              marginTop:14, width:"100%", padding:"8px 0", borderRadius:7,
              background:"transparent", color:INK_FAINT, fontWeight:500, fontSize:12,
              border:`1px solid ${BORDER}`, cursor:"pointer" }}>
              Close
            </button>
          </div>
        </div>
      )}

      {/* ═══ HISTORY MODAL ═══ */}
      {showHistory && (
        <div onClick={() => setShowHistory(false)} style={{
          position:"fixed", inset:0, background:"rgba(26,31,54,0.45)", zIndex:50,
          display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
          <div onClick={e => e.stopPropagation()} style={{
            background:CARD, border:`1px solid ${BORDER}`, borderRadius:12,
            padding:18, width:"100%", maxWidth:460, maxHeight:"82vh", overflowY:"auto" }}>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div style={{ fontSize:15, fontWeight:600 }}>History</div>
              <button onClick={() => setShowHistory(false)} style={{
                border:"none", background:"transparent", color:INK_FAINT, fontSize:18, cursor:"pointer", padding:"0 4px" }}>×</button>
            </div>

            <div style={{ display:"flex", gap:6, marginBottom:14, flexWrap:"wrap" }}>
              {["all", ...Object.keys(SYLLABUS)].map(f => {
                const active = historyFilter === f;
                return (
                  <button key={f} onClick={() => setHistoryFilter(f)} style={{
                    fontSize:11, fontWeight:500, padding:"5px 11px", borderRadius:7, cursor:"pointer",
                    background: active ? INDIGO_SOFT : "#f9fafb",
                    color: active ? INDIGO : INK_MUTE,
                    border:`1px solid ${active ? "#e0e7ff" : BORDER}` }}>
                    {f === "all" ? "All subjects" : f}
                  </button>
                );
              })}
            </div>

            {(() => {
              const list = getHistoryList().filter(item => historyFilter === "all" || item.subject === historyFilter);
              if (list.length === 0) {
                return <div style={{ textAlign:"center", color:INK_FAINT, padding:"30px 0", fontSize:13 }}>
                  No activity recorded yet. Tap a chapter to start tracking.
                </div>;
              }
              return (
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {list.map((item, i) => {
                    const tag = item.section ? `${item.subject} · ${item.section}` : item.subject;
                    return (
                      <div key={i} style={{ border:`1px solid ${BORDER}`, borderRadius:9, padding:"10px 12px" }}>
                        <div style={{ fontSize:9.5, fontWeight:600, color:INK_FAINT, letterSpacing:0.3 }}>{tag.toUpperCase()}</div>
                        <div style={{ fontSize:13, fontWeight:600, color:INK, marginTop:2, marginBottom:7 }}>{item.chapter}</div>
                        <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                          {["in_progress","completed","revision"].map(stage => {
                            if (!item.entry[stage]) return null;
                            const meta = STATUS_META[stage];
                            return (
                              <div key={stage} style={{ display:"flex", alignItems:"center", gap:7 }}>
                                <span style={{ width:6, height:6, borderRadius:"50%", background:meta.dot, flexShrink:0 }}/>
                                <span style={{ fontSize:10.5, fontWeight:600, color:meta.color, minWidth:78 }}>{meta.label}</span>
                                <span style={{ fontSize:10.5, color:INK_MUTE }}>{formatTimestamp(item.entry[stage])}</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            <button onClick={() => setShowHistory(false)} style={{
              marginTop:14, width:"100%", padding:"8px 0", borderRadius:7,
              background:"transparent", color:INK_FAINT, fontWeight:500, fontSize:12,
              border:`1px solid ${BORDER}`, cursor:"pointer" }}>
              Close
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<JEETracker />);
</script>
</body>
</html>
